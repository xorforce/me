name: Refresh Spotify Snapshot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "spotify-snapshot"
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps || (rm -f package-lock.json && npm install --legacy-peer-deps)

      - name: Generate Spotify now playing snapshot
        run: npm run spotify:generate
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

      - name: Publish snapshot branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/spotify-data
          cp public/spotify-now-playing.json /tmp/spotify-data/spotify-now-playing.json
          cd /tmp/spotify-data
          git init --initial-branch=spotify-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spotify-now-playing.json
          git commit -m "Refresh Spotify snapshot"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin spotify-data
